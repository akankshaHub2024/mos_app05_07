name: Deploy to Test Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Copy Files to Apache
      run: |
        
        $GITHUB_WORKSPACE/ \
        /opt/lampp/htdocs/msdpl.com_new/

    - name: Verify Deployment
      run: |
        ls -l /opt/lampp/htdocs/msdpl.com_new
