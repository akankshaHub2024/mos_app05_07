name: Deploy to Test Server

on:
  push:
    branches:
      - dev1
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Current User
        run: whoami

      - name: Copy Files to Apache
        run: |
          rsync -av \
          $GITHUB_WORKSPACE/ \
          /opt/lampp/htdocs/msdpl.com_new/
  
      - name: Verify Deployment
        run: |
          ls -l /opt/lampp/htdocs/msdpl.com_new
